<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;

  .gate { display: flex; align-items: center; justify-content: center;

                border: 1px solid #d1d5db; border-radius: 6px; margin-bottom: 12px;
                font-family: inherit; }
  .gate button { width: 100%; padding: 10px 16px; font-size: 14px; font-weight: 600;
                 background: #0e2748; color: white; border: none; border-radius: 6px;
                 cursor: pointer; }
  .gate button:hover { background: #1a3a6e; }
  .gate .err { color: #c62828; font-size: 12px; margin-top: 8px; min-height: 16px; }
  .gate .conf { background: #2c2c2c; color: white; padding: 6px 12px;
                border-radius: 4px; font-size: 11px; font-weight: 600; margin-bottom: 16px; display: inline-block; }
</style>

async function unlock() {
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('err');
  err.textContent = '';
  try {
    const data = Uint8Array.from(atob(ENCRYPTED), c => c.charCodeAt(0));
    const salt = data.slice(0, 16);
    const iv = data.slice(16, 28);
    const ct = data.slice(28);
    const keyMat = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']
    );
    const key = await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt, iterations:200000, hash:'SHA-256'},
      keyMat, {name:'AES-GCM', length:256}, false, ['decrypt']
    );
    const decrypted = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
    const html = new TextDecoder().decode(decrypted);
    document.open();
    document.write(html);
    document.close();
  } catch(e) {
    err.textContent = 'Wrong password.';
  }
}
document.getElementById('pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock();
});
